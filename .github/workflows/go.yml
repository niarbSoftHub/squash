name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

    - name: Format Check
      run: |
        if [ -n "$(gofmt -s -l ./)" ]; then
          echo "Go code is not formatted"
          gofmt -s -d ./
          exit 1
        fi

    - name: Vet
      run: go vet ./...
